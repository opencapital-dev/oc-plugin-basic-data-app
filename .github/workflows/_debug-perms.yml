name: _debug-perms
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: try push (dry-run)
        run: |
          git push --dry-run --no-verify \
            https://x-access-token:${{ github.token }}@github.com/${{ github.repository }} HEAD:main \
            && echo "PUSH OK" || echo "PUSH DENIED"
